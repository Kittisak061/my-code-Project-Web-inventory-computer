<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="1;url=dashboard.html?v=20260427a">
<title>Redirecting to Dashboard - DeviceHub</title>
<link rel="stylesheet" href="assets/css/theme.css?v=20260427c">
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,rgba(0,212,255,.12),transparent 38%),linear-gradient(180deg,#09101a,#05080d);color:var(--text);}
.redirect-card{width:min(560px,calc(100vw - 40px));padding:28px;border-radius:24px;border:1px solid rgba(122,136,153,.16);background:linear-gradient(180deg,rgba(15,21,31,.96),rgba(8,12,18,.98));box-shadow:0 24px 64px rgba(0,0,0,.34);}
.redirect-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.22);color:var(--cyan);font-size:11px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;}
.redirect-card h1{margin:16px 0 10px;font-family:var(--display);font-size:34px;line-height:1.02;}
.redirect-card p{margin:0;color:var(--text2);line-height:1.8;}
.redirect-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:20px;}
</style>
</head>
<body>
  <div class="redirect-card">
    <div class="redirect-badge"><i class="ri-dashboard-line"></i> Reports Removed</div>
    <h1>Reports page moved into Dashboard</h1>
    <p>Summary, status overview, and main shortcuts now live in Dashboard. Old bookmarks will be redirected automatically.</p>
    <div class="redirect-actions">
      <a class="btn btn-primary" href="dashboard.html?v=20260427a">Open Dashboard</a>
      <a class="btn btn-ghost" href="export.html?v=20260427a">Open Export Excel</a>
    </div>
  </div>
  <script>
  window.setTimeout(function(){
    window.location.replace('dashboard.html?v=20260427a');
  }, 700);
  </script>
</body>
</html>
