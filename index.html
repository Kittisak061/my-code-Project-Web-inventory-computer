<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>DeviceHub - IT Asset Management</title>
<link rel="stylesheet" href="assets/css/dashboard.css?v=20260427c">
<style>
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
}

.entry-card {
  width: min(480px, 100%);
  padding: 40px 32px;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  background: var(--bg-card);
  box-shadow: var(--shadow-xl);
  text-align: center;
}

.entry-logo {
  width: 72px;
  height: 72px;
  margin: 0 auto 20px;
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: var(--shadow-md);
}

.entry-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.entry-copy {
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 24px;
  font-size: 14px;
}

.entry-status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 36px;
  padding: 0 14px;
  border-radius: var(--radius-full);
  background: var(--bg-main);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
}

.entry-status::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
</style>
</head>
<body>
<div class="entry-card">
  <div class="entry-logo"><i class="ri-server-line"></i></div>
  <h1 class="entry-title">DeviceHub</h1>
  <p class="entry-copy">Enterprise IT Asset Management Platform. Redirecting you to the appropriate page...</p>
  <div class="entry-status" id="entryStatus">Checking session...</div>
</div>
<script>
(function redirectEntry(){
  var statusEl = document.getElementById('entryStatus');
  function go(path, message){
    if (statusEl) statusEl.textContent = message;
    window.location.replace(path);
  }

  try {
    var token = sessionStorage.getItem('dh_token');
    var rawUser = sessionStorage.getItem('dh_user');
    var user = null;
    if (rawUser) {
      try { user = JSON.parse(rawUser); } catch (e) {}
    }

    if (token && user && user.username) {
      go('dashboard.html', 'Session found. Redirecting to Dashboard...');
      return;
    }
  } catch (e) {}

  go('login.html', 'No session found. Redirecting to Login...');
})();
</script>
</body>
</html>
