<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>DeviceHub</title>
<link rel="stylesheet" href="assets/css/theme.css?v=20260427c">
<script src="assets/js/config.js?v=20260427c"></script>
<style>
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.entry-card{
  width:min(460px,100%);
  padding:28px 26px;
  border-radius:26px;
  border:1px solid rgba(53,216,255,.16);
  background:linear-gradient(180deg,rgba(12,18,29,.96),rgba(8,13,21,.98));
  box-shadow:0 28px 80px rgba(0,0,0,.36);
  text-align:center;
}
.entry-logo{
  width:78px;
  height:78px;
  margin:0 auto 18px;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  background:linear-gradient(135deg,#35d8ff,#0a67ad 74%);
  box-shadow:0 18px 34px rgba(53,216,255,.28);
}
.entry-title{
  font-size:34px;
  font-weight:800;
  line-height:1.05;
  margin-bottom:8px;
}
.entry-copy{
  color:var(--text2);
  line-height:1.75;
  margin-bottom:18px;
}
.entry-status{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:40px;
  padding:0 14px;
  border-radius:999px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(122,136,153,.18);
  color:var(--text2);
  font-size:13px;
}
.entry-status::before{
  content:'';
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 10px rgba(53,216,255,.55);
}
</style>
</head>
<body>
<div class="entry-card">
  <div class="entry-logo"><i class="ri-cpu-fill"></i></div>
  <div class="entry-title">DeviceHub</div>
  <div class="entry-copy">กำลังพาคุณไปยังหน้าที่เหมาะสม หากมี session อยู่ ระบบจะเข้า Dashboard ให้ทันที แต่ถ้ายังไม่ได้เข้าสู่ระบบ ระบบจะพาไปหน้า Login อัตโนมัติ</div>
  <div class="entry-status" id="entryStatus">กำลังตรวจสอบ session...</div>
</div>
<script>
(function redirectEntry(){
  var statusEl = document.getElementById('entryStatus');
  function go(path, message){
    if (statusEl) statusEl.textContent = message;
    window.location.replace(pageUrl(path));
  }

  try {
    var token = sessionStorage.getItem('dh_token');
    var rawUser = sessionStorage.getItem('dh_user');
    var user = null;
    if (rawUser) {
      try { user = JSON.parse(rawUser); } catch (e) {}
    }

    if (token && user && user.username) {
      go('dashboard.html', 'พบ session แล้ว กำลังเข้าสู่ Dashboard...');
      return;
    }
  } catch (e) {}

  go('login.html', 'ยังไม่ได้เข้าสู่ระบบ กำลังไปหน้า Login...');
})();
</script>
</body>
</html>
